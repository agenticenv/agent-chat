# Postgres auth is shared between the postgres service and server (see x-postgres-auth).
# Server listens on :8080 in the container; published to host :8081 (avoid clashing with a local :8080).
# After server/Dockerfile changes: make up   or   docker compose up -d --build

x-postgres-auth: &postgres-auth
  POSTGRES_USER: temporal
  POSTGRES_PASSWORD: temporal

services:
  temporal:
    image: temporalio/auto-setup:latest
    ports:
      - 7233:7233
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_SEEDS: postgres
      DBNAME: temporaldb
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
    healthcheck:
      test: ["CMD-SHELL", "temporal workflow list --address $(hostname):7233"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:13-alpine
    environment:
      <<: *postgres-auth
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/db/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "8081:8080"
    environment:
      <<: *postgres-auth
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: agentdb
      TEMPORAL_HOST: temporal
      TEMPORAL_PORT: "7233"
      TEMPORAL_NAMESPACE: default
      TEMPORAL_TASK_QUEUE: agent-chat
    env_file:
      - ./server/.env # loads LLM, agent settings
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_healthy

  temporal-ui:
    image: temporalio/ui:latest
    ports:
      - "8233:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      temporal:
        condition: service_healthy

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
      args:
        # true = SSE streaming (default), false = REST mode
        ENABLE_STREAM: ${ENABLE_STREAM:-true}
    ports:
      - "3000:3000"
    environment:
      # Backend origin (no /api): Vite dev proxy target; Docker entrypoint writes config.json for the browser.
      SERVER_API_URL: ${SERVER_API_URL:-http://localhost:8081}
    depends_on:
      - server

volumes:
  postgres_data: